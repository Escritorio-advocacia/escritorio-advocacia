async function salvarContrato(){

const inquilino_id = document.getElementById("inquilinoSelect").value
const unidade_id = document.getElementById("unidadeContratoSelect").value
const valor = document.getElementById("valorContrato").value
const vencimento = document.getElementById("vencimentoContrato").value

const arquivo = document.getElementById("contratoPDF").files[0]

let urlContrato = null

// upload do contrato
if(arquivo){

const nomeArquivo = Date.now() + "_" + arquivo.name

const { data, error } = await client.storage
.from("contratos")
.upload(nomeArquivo, arquivo)

if(!error){
urlContrato = nomeArquivo
}

}

// criar contrato no banco
const { data: contratoCriado } = await client
.from("contratos")
.insert({
inquilino_id,
unidade_id,
valor_aluguel: valor,
dia_vencimento: vencimento,
arquivo_contrato: urlContrato
})
.select()
.single()

// marcar unidade como ocupada
await client
.from("unidades")
.update({ status: "ocupada" })
.eq("id", unidade_id)

// gerar pagamentos
for(let mes = 1; mes <= 12; mes++){

await client.from("pagamentos").insert({
contrato_id: contratoCriado.id,
mes,
ano: new Date().getFullYear(),
valor,
status: "pendente"
})

}

listarContratos()

}

async function listarPagamentos(){

const { data } = await client
.from("pagamentos")
.select("*")
.order("mes")

let html = ""

data.forEach(p => {

const hoje = new Date()
const mesAtual = hoje.getMonth() + 1

let status = p.status
let cor = "black"

if(p.status == "pago"){
cor = "green"
}

if(p.status == "pendente"){
cor = "orange"
}

if(p.status == "pendente" && p.mes < mesAtual){
status = "ATRASADO"
cor = "red"
}

html += `
<p style="color:${cor}">
Mês ${p.mes} - R$ ${p.valor} - ${status}
<button onclick="pagar(${p.id})">Pagar</button>
</p>
`

async function calcularInadimplentes(){

const { data } = await client
.from("pagamentos")
.select("*")

let html = ""

const hoje = new Date()
const diaHoje = hoje.getDate()

data.forEach(p => {

if(p.status == "pendente"){

let atraso = diaHoje - p.mes

if(atraso > 5){

html += `
<p>⚠ Pagamento ${p.id} — ${atraso} dias de atraso</p>
`

}

}

})

document.getElementById("inadimplentes").innerHTML = html

}

async function pagar(id){

const { data: pagamento } = await client
.from("pagamentos")
.select("*")
.eq("id", id)
.single()

const { data: contrato } = await client
.from("contratos")
.select("*")
.eq("id", pagamento.contrato_id)
.single()

const { data: inquilino } = await client
.from("inquilinos")
.select("*")
.eq("id", contrato.inquilino_id)
.single()

const hoje = new Date()
const diaHoje = hoje.getDate()

let atraso = diaHoje - inquilino.dia_vencimento

if(atraso < 0){
atraso = 0
}

let juros = 0
let multaAgua = 0

if(atraso > 5){

juros = inquilino.valor_aluguel * (0.005 * atraso)
multaAgua = inquilino.valor_agua * 0.10

}

const total = Number(pagamento.valor) + juros + multaAgua

await client
.from("pagamentos")
.update({
status:"pago",
valor_pago: total
})
.eq("id", id)

listarPagamentos()

gerarReciboPDF(inquilino.nome,total,pagamento.mes)
listarPagamentos()

}

const { data: contratos } = await client.from("contratos").select("*")
const { data: inquilinos } = await client.from("inquilinos").select("*")

</button>

`

})

}

Seu aluguel no valor de R$ ${valor} está em atraso.

Por favor regularize o pagamento.`

const url = `https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`

window.open(url,"_blank")

}

async function verHistorico(inquilino_id){

const { data: contratos } = await client
.from("contratos")
.select("*")
.eq("inquilino_id", inquilino_id)

if(!contratos.length){
document.getElementById("historicoPagamentos").innerHTML = "Nenhum contrato encontrado"
return
}

const contrato = contratos[0]

const { data: pagamentos } = await client
.from("pagamentos")
.select("*")
.eq("contrato_id", contrato.id)
.order("mes")

let html = "<h4>Linha do tempo de pagamentos</h4>"

pagamentos.forEach(p=>{

let status = p.status
let cor = "black"

const hoje = new Date()
const mesAtual = hoje.getMonth()+1

if(p.status=="pago"){
cor="green"
}

if(p.status=="pendente"){
cor="orange"
}

if(p.status=="pendente" && p.mes < mesAtual){
status="ATRASADO"
cor="red"
}

html += `
<p style="color:${cor}">
Mês ${p.mes} - R$ ${p.valor} - ${status}
</p>
`

})

document.getElementById("historicoPagamentos").innerHTML = html
}
  
let graficoMensalChart
async function graficoMensal(){

const { data } = await client
.from("pagamentos")
.select("*")

let meses = []
let valores = []

for(let i=1;i<=12;i++){

const totalMes = data
.filter(p => p.mes == i && p.status == "pago")
.reduce((sum,p)=> sum + Number(p.valor),0)

meses.push("Mês " + i)
valores.push(totalMes)

}

const ctx = document.getElementById("graficoMensal")

if(graficoMensalChart){
graficoMensalChart.destroy()
}

graficoMensalChart = new Chart(ctx,{

type: "bar",

data: {
labels: meses,

datasets: [{
label: "Recebimentos",
data: valores
}]
}

})

}
  function simularValor(){

const aluguel = Number(document.getElementById("valorAluguel").value)
const agua = Number(document.getElementById("valorAgua").value)
const vencimento = Number(document.getElementById("diaVencimento").value)

const hoje = new Date()
const diaHoje = hoje.getDate()

let atraso = diaHoje - vencimento

if(atraso < 0){
atraso = 0
}

let jurosAluguel = 0
let multaAgua = 0

// tolerância de 5 dias
if(atraso > 5){

const diasJuros = atraso
jurosAluguel = aluguel * (0.005 * diasJuros)

multaAgua = agua * 0.10

}

const total = aluguel + agua + jurosAluguel + multaAgua

document.getElementById("resultadoSimulacao").innerHTML = `

<p>Dias em atraso: ${atraso}</p>

<p>Aluguel: R$ ${aluguel}</p>

<p>Água: R$ ${agua}</p>

<p>Juros aluguel: R$ ${jurosAluguel.toFixed(2)}</p>

<p>Multa água: R$ ${multaAgua.toFixed(2)}</p>

<h3>Total atualizado: R$ ${total.toFixed(2)}</h3>

`

}
  function simularInquilino(aluguel,agua,vencimento){

const hoje = new Date()
const diaHoje = hoje.getDate()

let atraso = diaHoje - vencimento

if(atraso < 0){
atraso = 0
}

let jurosAluguel = 0
let multaAgua = 0

if(atraso > 5){

const diasJuros = atraso
jurosAluguel = aluguel * (0.005 * diasJuros)

multaAgua = agua * 0.10

}

const total = aluguel + agua + jurosAluguel + multaAgua

alert(

`Dias atraso: ${atraso}

Aluguel: ${aluguel}

Água: ${agua}

Juros: ${jurosAluguel.toFixed(2)}

Multa água: ${multaAgua.toFixed(2)}

TOTAL: ${total.toFixed(2)}`

)

}

async function exportarExcel(){

const { data } = await client
.from("pagamentos")
.select("*")

const planilha = data.map(p => ({
Mes: p.mes,
Valor: p.valor,
Status: p.status
}))

const ws = XLSX.utils.json_to_sheet(planilha)

const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Relatorio")

XLSX.writeFile(wb, "relatorio_aluguel.xlsx")

}

async function historicoInquilino(inquilino_id){

const { data: contratos } = await client
.from("contratos")
.select("*")
.eq("inquilino_id", inquilino_id)

if(!contratos.length){
document.getElementById("historicoPagamentos").innerHTML = "Sem histórico"
return
}

const contrato_id = contratos[0].id

const { data: pagamentos } = await client
.from("pagamentos")
.select("*")
.eq("contrato_id", contrato_id)
.order("mes")

let html = ``

pagamentos.forEach(p => {

let status = p.status
let cor = "black"

if(p.status == "pago"){
status = "✔ Pago"
cor = "green"
}

if(p.status == "pendente"){
status = "⏳ Pendente"
cor = "orange"
}

html += `
<p style="color:${cor}">
Mês ${p.mes} - R$ ${p.valor} - ${status}
</p>
`

})

document.getElementById("historicoPagamentos").innerHTML = html

}
