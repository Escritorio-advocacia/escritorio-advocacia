<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escritório de Advocacia</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162d6b;
}

input{
padding:8px;
margin-right:10px;
}

</style>

</head>

<body>

<header>
Sistema — Escritório de Advocacia
</header>

<div class="container">

<div class="card">
<h3>Painel Financeiro</h3>
<p>Controle de aluguéis e recebimentos.</p>
</div>


<div class="card">

<h3>Prédios</h3>

<input id="nomePredio" placeholder="Nome do prédio">
<input id="enderecoPredio" placeholder="Endereço">

<button onclick="salvarPredio()">Salvar Prédio</button>

<h4>Lista de prédios</h4>

<div id="listaPredios"></div>

</div>


<div class="card">
<h3>Unidades</h3>
<button>Cadastrar Unidade</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://foegiwrgbkkhsqzpgcou.supabase.co"

const supabaseKey = "sb_publishable_CzV3zALwOBIrRwR_6btWbw_ivcBzW5z"

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
)


async function salvarPredio(){

const nome = document.getElementById("nomePredio").value
const endereco = document.getElementById("enderecoPredio").value

if(!nome || !endereco){
alert("Preencha os campos")
return
}

const { data, error } = await supabase
.from("predios")
.insert([
{ nome: nome, endereco: endereco }
])

if(error){
console.log(error)
alert("Erro ao salvar")
return
}

alert("Prédio cadastrado")

listarPredios()

}



async function listarPredios(){

const { data, error } = await supabase
.from("predios")
.select("*")

if(error){
console.log(error)
return
}

let html = ""

data.forEach(predio => {

html += `<p>${predio.nome} - ${predio.endereco}</p>`

})

document.getElementById("listaPredios").innerHTML = html

}


listarPredios()

</script>
