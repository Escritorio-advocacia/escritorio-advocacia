<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escritório de Advocacia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

input,select{
padding:8px;
margin-right:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
Sistema — Escritório de Advocacia
</header>

<div class="container">

<div class="card">

<h3>Prédios</h3>

<input id="nomePredio" placeholder="Nome do prédio">
<input id="enderecoPredio" placeholder="Endereço">

<button onclick="salvarPredio()">Salvar Prédio</button>

<h4>Lista de prédios</h4>
<div id="listaPredios"></div>

</div>


<div class="card">

<h3>Unidades</h3>

<select id="predioSelect"></select>

<input id="numeroUnidade" placeholder="Número da unidade">

<button onclick="salvarUnidade()">Salvar Unidade</button>

<h4>Lista de unidades</h4>
<div id="listaUnidades"></div>

</div>


<div class="card">

<h3>Inquilinos</h3>

<input id="nomeInquilino" placeholder="Nome">

<select id="unidadeSelect"></select>

<input type="number" id="valorAluguel" placeholder="Valor do aluguel">

<input type="number" id="vencimento" placeholder="Dia do vencimento">

<button onclick="salvarInquilino()">Salvar Inquilino</button>

<h4>Lista de inquilinos</h4>
<div id="listaInquilinos"></div>

</div>

</div>


<script>

const supabaseUrl = "SUA_URL_SUPABASE"
const supabaseKey = "SUA_ANON_KEY"

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

async function salvarPredio(){

const nome = document.getElementById("nomePredio").value
const endereco = document.getElementById("enderecoPredio").value

if(!nome || !endereco){
alert("Preencha os campos")
return
}

await supabase.from("predios").insert([
{
nome:nome,
endereco:endereco
}
])

document.getElementById("nomePredio").value=""
document.getElementById("enderecoPredio").value=""

listarPredios()
carregarPredios()

}

async function listarPredios(){

const {data} = await supabase
.from("predios")
.select("*")

let html=""

data.forEach(p=>{

html+=`<p>${p.nome} - ${p.endereco}</p>`

})

document.getElementById("listaPredios").innerHTML=html

}

async function carregarPredios(){

const {data} = await supabase
.from("predios")
.select("*")

let select=document.getElementById("predioSelect")

select.innerHTML=""

data.forEach(p=>{

select.innerHTML+=`<option value="${p.id}">${p.nome}</option>`

})

}

async function salvarUnidade(){

const predio_id=document.getElementById("predioSelect").value
const numero=document.getElementById("numeroUnidade").value

await supabase.from("unidades").insert([
{
predio_id:predio_id,
numero:numero
}
])

document.getElementById("numeroUnidade").value=""

listarUnidades()
carregarUnidades()

}

async function listarUnidades(){

const {data} = await supabase
.from("unidades")
.select("*")

let html=""

data.forEach(u=>{

html+=`<p>Unidade ${u.numero}</p>`

})

document.getElementById("listaUnidades").innerHTML=html

}

async function carregarUnidades(){

const {data} = await supabase
.from("unidades")
.select("*")

let select=document.getElementById("unidadeSelect")

select.innerHTML=""

data.forEach(u=>{

select.innerHTML+=`<option value="${u.id}">${u.numero}</option>`

})

}

async function salvarInquilino(){

const nome=document.getElementById("nomeInquilino").value
const unidade_id=document.getElementById("unidadeSelect").value
const valor=document.getElementById("valorAluguel").value
const vencimento=document.getElementById("vencimento").value

await supabase.from("inquilinos").insert([
{
nome:nome,
unidade_id:unidade_id,
valor_aluguel:valor,
dia_vencimento:vencimento
}
])

document.getElementById("nomeInquilino").value=""
document.getElementById("valorAluguel").value=""
document.getElementById("vencimento").value=""

listarInquilinos()

}

async function listarInquilinos(){

const {data} = await supabase
.from("inquilinos")
.select("*")

let html=""

data.forEach(i=>{

html+=`<p>${i.nome}</p>`

})

document.getElementById("listaInquilinos").innerHTML=html

}

listarPredios()
listarUnidades()
listarInquilinos()
carregarPredios()
carregarUnidades()

</script>

</body>
</html>
