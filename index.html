<!DOCTYPE html>
<html>
<head>

<title>Sistema de Aluguel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
</head>

<body>

<h2>Sistema de Aluguel</h2>
  
<h2>Dashboard</h2>
<div id="dashboard"></div>
<h3>📅 Vencimentos de Hoje</h3>
<div id="vencimentosHoje"></div>
<canvas id="graficoFinanceiro" width="400" height="200"></canvas>
<div id="alertaInadimplentes" style="
background:#ffe5e5;
padding:10px;
margin:10px 0;
font-weight:bold;
color:red;
"></div>
  
<h2>Devedores</h2>
<button onclick="cobrarTodos()">📲 Cobrar todos atrasados</button>
<div id="listaDevedores"></div>
<h3>Prédios</h3>

<input id="nomePredio" placeholder="Nome do prédio ou endereço">
<button onclick="salvarPredio()">Salvar</button>

<div id="listaPredios"></div>


<h3>Unidades</h3>
  
<h3>Mapa de Ocupação</h3>
<div id="mapaOcupacao"></div>

<select id="predioSelect"></select>

<input id="numeroUnidade" placeholder="Número ou nome da unidade">

<button onclick="salvarUnidade()">Salvar</button>

<div id="listaUnidades"></div>


<h3>Inquilinos</h3>
  
<input id="buscaInquilino" placeholder="Buscar inquilino" onkeyup="buscarInquilino()">

<input id="nomeInquilino" placeholder="Nome do inquilino">

<select id="unidadeSelect"></select>

<input id="telefoneInquilino" placeholder="Telefone ou WhatsApp">

<input id="valorAluguel" placeholder="Valor do aluguel">

<input id="diaVencimento" placeholder="Dia do vencimento">

<button onclick="salvarInquilino()">Salvar</button>
<div id="listaInquilinos"></div>
  
<h3>Histórico do Inquilino</h3>
<div id="historicoPagamentos"></div>
<h3>Contratos</h3>

<select id="inquilinoSelect"></select>

<select id="unidadeContratoSelect"></select>

<input id="valorContrato" placeholder="Valor do aluguel">

<input id="vencimentoContrato" placeholder="Dia do vencimento (1-31)">

<button onclick="salvarContrato()">Criar</button>

<div id="listaContratos"></div>
  <h3>Pagamentos</h3>

<div id="listaPagamentos"></div>
  
<h3>Relatório Financeiro</h3>

<button onclick="relatorioFinanceiro()">Gerar relatório</button>

<button onclick="exportarPDF()">📄 Exportar relatório PDF</button>

<div id="relatorio"></div>
<h2>Recibo</h2>
<div id="recibo"></div>
<script>

const supabaseUrl = "https://foegiwrgbkkhsqzpgcou.supabase.co"
const supabaseKey = "sb_publishable_CzV3zALwQBTrRwR_6btWbw_jvcBzW5z"

const client = supabase.createClient(supabaseUrl, supabaseKey)



async function salvarPredio(){

const nome = document.getElementById("nomePredio").value

await client.from("predios").insert({nome})

listarPredios()

}



async function listarPredios(){

const {data} = await client.from("predios").select("*")

let html=""

data.forEach(p=>{

html += `<p>${p.nome}</p>`

})

document.getElementById("listaPredios").innerHTML = html

}



async function salvarUnidade(){

const predio_id = document.getElementById("predioSelect").value

const numero = document.getElementById("numeroUnidade").value

await client.from("unidades").insert({

predio_id,
numero

})

listarUnidades()

}



async function listarUnidades(){

const {data} = await client.from("unidades").select("*")

let html=""

data.forEach(u=>{

html += `<p>Unidade ${u.numero}</p>`

})

document.getElementById("listaUnidades").innerHTML = html

}



async function salvarInquilino(){

const nome = document.getElementById("nomeInquilino").value

const unidade_id = document.getElementById("unidadeSelect").value
  
const telefone = document.getElementById("telefoneInquilino").value
  
const valor = document.getElementById("valorAluguel").value

const vencimento = document.getElementById("diaVencimento").value

await client.from("inquilinos").insert({

nome,
telefone,
unidade_id,
valor_aluguel: valor,
dia_vencimento: vencimento

})

listarInquilinos()

}



async function listarInquilinos(){

const {data} = await client.from("inquilinos").select("*")

let html=""

data.forEach(i=>{

html += `
<p>
${i.nome}

<button onclick="verHistorico(${i.id})">
📜 Histórico
</button>

</p>
`

})

document.getElementById("listaInquilinos").innerHTML = html

}



async function salvarContrato(){

const inquilino_id = Number(document.getElementById("inquilinoSelect").value)
const unidade_id = Number(document.getElementById("unidadeContratoSelect").value)

const valor = Number(document.getElementById("valorContrato").value)
const vencimento = Number(document.getElementById("vencimentoContrato").value)

const { data: contratoCriado } = await client
.from("contratos")
.insert({
inquilino_id,
unidade_id,
valor_aluguel: valor,
dia_vencimento: vencimento
})
.select()
.single()

for(let mes = 1; mes <= 12; mes++){

await client.from("pagamentos").insert({
contrato_id: contratoCriado.id,
mes,
ano: new Date().getFullYear(),
valor,
status: "pendente"
})

}

listarContratos()

}



async function listarContratos(){

const {data} = await client.from("contratos").select("*")

let html=""

data.forEach(c=>{

html += `<p>Contrato ${c.id}</p>`

})

document.getElementById("listaContratos").innerHTML = html

}



async function listarPagamentos(){

const { data } = await client
.from("pagamentos")
.select("*")
.order("mes")

let html = ""

data.forEach(p => {

const hoje = new Date()
const mesAtual = hoje.getMonth() + 1

let status = p.status
let cor = "black"

if(p.status == "pago"){
cor = "green"
}

if(p.status == "pendente"){
cor = "orange"
}

if(p.status == "pendente" && p.mes < mesAtual){
status = "ATRASADO"
cor = "red"
}

html += `
<p style="color:${cor}">
Mês ${p.mes} - R$ ${p.valor} - ${status}
<button onclick="pagar(${p.id})">Pagar</button>
</p>
`

})

document.getElementById("listaPagamentos").innerHTML = html

}



async function pagar(id){

await client
.from("pagamentos")
.update({ status: "pago" })
.eq("id", id)

listarPagamentos()

}



async function carregarDashboard(){

const { data } = await client
.from("pagamentos")
.select("*")

let recebido = 0
let pendente = 0

data.forEach(p => {

if(p.status == "pago"){
recebido += Number(p.valor)
}

if(p.status == "pendente"){
pendente += Number(p.valor)
}

})

const { count } = await client
.from("contratos")
.select("*", { count: "exact", head: true })

document.getElementById("dashboard").innerHTML = `
<p>💰 Recebido: R$ ${recebido}</p>
<p>📅 A receber: R$ ${pendente}</p>
<p>📄 Contratos ativos: ${count}</p>
`

}



async function listarDevedores(){

const hoje = new Date()
const mesAtual = hoje.getMonth() + 1

const { data: pagamentos } = await client.from("pagamentos").select("*")
const { data: contratos } = await client.from("contratos").select("*")
const { data: inquilinos } = await client.from("inquilinos").select("*")

let html = ""

pagamentos.forEach(p => {

if(p.status == "pendente" && p.mes < mesAtual){

const contrato = contratos.find(c => c.id == p.contrato_id)

if(!contrato) return

const inquilino = inquilinos.find(i => i.id == contrato.inquilino_id)

if(!inquilino) return

html += `
<p style="color:red">
⚠ ${inquilino.nome}<br>
Mês ${p.mes} atrasado<br>
Dívida: R$ ${p.valor}
</p>
`

}

})

document.getElementById("listaDevedores").innerHTML = html

}

const mensagem = `Olá ${nome}.

Seu aluguel está em aberto.

Valor: R$${valor}

Favor realizar o pagamento. Obrigado.`

const url = `https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`

window.open(url,"_blank")

}

 async function alertaInadimplentes(){

const hoje = new Date()
const mesAtual = hoje.getMonth() + 1

const { data } = await client
.from("pagamentos")
.select("*")

let atrasados = 0
let total = 0

data.forEach(p => {

if(p.status == "pendente" && p.mes < mesAtual){

atrasados++
total += Number(p.valor)

}

})

document.getElementById("alertaInadimplentes").innerHTML = `
⚠ ${atrasados} pagamentos atrasados | Total em aberto: R$ ${total}
`

}
async function graficoFinanceiro(){

const { data } = await client
.from("pagamentos")
.select("*")

let pago = 0
let pendente = 0

data.forEach(p => {

if(p.status == "pago"){
pago += Number(p.valor)
}

if(p.status == "pendente"){
pendente += Number(p.valor)
}

})

const ctx = document.getElementById("graficoFinanceiro")

new Chart(ctx, {

type: 'doughnut',

data: {
labels: ['Recebido', 'Pendente'],
datasets: [{
data: [pago, pendente],
backgroundColor: ['green','orange']
}]
}

})

}
async function mapaOcupacao(){

const { data: unidades } = await client
.from("unidades")
.select("*")

const { data: contratos } = await client
.from("contratos")
.select("*")

let html = ""

unidades.forEach(u => {

const contrato = contratos.find(c => c.unidade_id == u.id)

if(contrato){

html += `<p style="color:green">🟢 Unidade ${u.numero} - Ocupada</p>`

}else{

html += `<p style="color:red">🔴 Unidade ${u.numero} - Vazia</p>`

}

})

document.getElementById("mapaOcupacao").innerHTML = html

}
async function buscarInquilino(){

const texto = document.getElementById("buscaInquilino").value.toLowerCase()

const {data} = await client
.from("inquilinos")
.select("*")

let html=""

data.forEach(i=>{

if(i.nome.toLowerCase().includes(texto)){

html += `
<p>
${i.nome} - ${i.telefone}
<button onclick="cobrarWhatsapp('${i.telefone}','${i.nome}',${i.valor_aluguel})">
📲 Cobrar
</button>
</p>
`

}

})

document.getElementById("listaInquilinos").innerHTML = html

}
  async function vencimentosHoje(){

const hoje = new Date()
const diaHoje = hoje.getDate()

const { data: contratos } = await client
.from("contratos")
.select("*")

const { data: inquilinos } = await client
.from("inquilinos")
.select("*")

let html=""

contratos.forEach(c=>{

if(c.dia_vencimento == diaHoje){

const inquilino = inquilinos.find(i=>i.id==c.inquilino_id)

if(!inquilino) return

html += `
<p>
${inquilino.nome} - R$${c.valor_aluguel}
<button onclick="cobrarWhatsapp('${inquilino.telefone}','${inquilino.nome}',${c.valor_aluguel})">
📲 Cobrar
</button>
</p>
`

}

})

document.getElementById("vencimentosHoje").innerHTML = html

}
async function exportarPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

const { data } = await client
.from("pagamentos")
.select("*")

let recebido = 0
let pendente = 0

data.forEach(p=>{

if(p.status=="pago"){
recebido += Number(p.valor)
}

if(p.status=="pendente"){
pendente += Number(p.valor)
}

})

doc.setFontSize(18)
doc.text("RELATÓRIO DE RECEBIMENTOS",20,20)

doc.setFontSize(12)
doc.text(`Total recebido: R$ ${recebido}`,20,40)
doc.text(`Total pendente: R$ ${pendente}`,20,50)

doc.save("relatorio-aluguel.pdf")

}
async function verHistorico(inquilino_id){

const { data: contratos } = await client
.from("contratos")
.select("*")
.eq("inquilino_id", inquilino_id)

if(!contratos.length){
document.getElementById("historicoPagamentos").innerHTML = "Nenhum contrato encontrado"
return
}

const contrato = contratos[0]

const { data: pagamentos } = await client
.from("pagamentos")
.select("*")
.eq("contrato_id", contrato.id)
.order("mes")

let html = "<h4>Linha do tempo de pagamentos</h4>"

pagamentos.forEach(p=>{

let status = p.status
let cor = "black"

const hoje = new Date()
const mesAtual = hoje.getMonth()+1

if(p.status=="pago"){
cor="green"
}

if(p.status=="pendente"){
cor="orange"
}

if(p.status=="pendente" && p.mes < mesAtual){
status="ATRASADO"
cor="red"
}

html += `
<p style="color:${cor}">
Mês ${p.mes} - R$ ${p.valor} - ${status}
</p>
`

})

document.getElementById("historicoPagamentos").innerHTML = html

}
window.onload = async () => {

await listarPredios()
await listarUnidades()
await listarInquilinos()

await listarContratos()
await listarPagamentos()

await carregarDashboard()
await listarDevedores()
  
await alertaInadimplentes()
await graficoFinanceiro()
await mapaOcupacao()
await vencimentosHoje()

}

</script>

</body>
</html>
