<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Aluguel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header{background:#1e3a8a;color:white;padding:20px;font-size:22px}
.container{padding:30px}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
button{background:#1e3a8a;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
input,select{padding:8px;margin-right:10px;margin-bottom:10px}
</style>
</head>

<body>

<header>Sistema — Escritório de Advocacia</header>

<div class="container">

<div class="card">
<h3>Prédios</h3>
<input id="nomePredio" placeholder="Nome do prédio">
<input id="enderecoPredio" placeholder="Endereço">
<button onclick="salvarPredio()">Salvar Prédio</button>

<h4>Lista de prédios</h4>
<div id="listaPredios"></div>
</div>

<div class="card">
<h3>Unidades</h3>

<select id="predioSelect"></select>

<input id="numeroUnidade" placeholder="Número da unidade">
<button onclick="salvarUnidade()">Salvar Unidade</button>

<h4>Lista de unidades</h4>
<div id="listaUnidades"></div>
</div>

<div class="card">
<h3>Inquilinos</h3>

<input id="nomeInquilino" placeholder="Nome">

<select id="unidadeSelect"></select>

<input id="valorAluguel" placeholder="Valor aluguel">

<input id="vencimento" placeholder="Dia vencimento">

<button onclick="salvarInquilino()">Salvar Inquilino</button>

<h4>Lista de inquilinos</h4>
<div id="listaInquilinos"></div>
</div>

</div>
<div class="card">

<h3>Contratos</h3>

<select id="inquilinoSelect"></select>

<select id="unidadeContratoSelect"></select>

<input id="valorContrato" placeholder="Valor aluguel">

<input id="vencimentoContrato" placeholder="Dia vencimento">

<button onclick="salvarContrato()">Criar Contrato</button>

<h4>Lista de contratos</h4>

<div id="listaContratos"></div>

</div>
<script>

const supabaseUrl = "https://foegiwrgbkkhsqzpgcou.supabase.co"
const supabaseKey = "sb_publishable_CzV3zALwQBTrRwR_6btWbw_jvcBzW5z"

const client = supabase.createClient(supabaseUrl, supabaseKey)



async function carregarInquilinosContrato(){

const {data} = await client.from("inquilinos").select("*")

const select = document.getElementById("inquilinoSelect")

select.innerHTML=""

data.forEach(i => {

const option = document.createElement("option")

option.value = i.id
option.text = i.nome

select.appendChild(option)

})

}



async function carregarUnidadesContrato(){

const {data} = await client.from("unidades").select("*")

const select = document.getElementById("unidadeContratoSelect")

select.innerHTML=""

data.forEach(u => {

const option = document.createElement("option")

option.value = u.id
option.text = "Unidade " + u.numero

select.appendChild(option)

})

}



async function salvarContrato(){

const inquilino_id = document.getElementById("inquilinoSelect").value
const unidade_id = document.getElementById("unidadeContratoSelect").value

const valor = Number(document.getElementById("valorContrato").value)

const vencimento = Number(document.getElementById("vencimentoContrato").value)



await client.from("contratos").insert({

inquilino_id: inquilino_id,
unidade_id: unidade_id,
valor_aluguel: valor,
dia_vencimento: vencimento

})

listarContratos()

}



async function listarContratos(){

const {data} = await client.from("contratos").select("*")

let html=""

data.forEach(c=>{

html += `<p>Contrato ${c.id} - aluguel ${c.valor_aluguel}</p>`

})

document.getElementById("listaContratos").innerHTML = html

}



listarPredios()
listarUnidades()
listarInquilinos()

carregarPredios()
carregarUnidades()

carregarInquilinosContrato()
carregarUnidadesContrato()

listarContratos()
</script>

</body>
</html>
