<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Escritório de Advocacia</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162d6b;
}

input{
padding:8px;
margin-right:10px;
}

</style>

</head>


<body>

<header>
Sistema — Escritório de Advocacia
</header>


<div class="container">


<div class="card">

<h3>Painel Financeiro</h3>

<p>Controle de aluguéis e recebimentos.</p>

</div>



<div class="card">

<h3>Prédios</h3>

<input id="nomePredio" placeholder="Nome do prédio">

<input id="enderecoPredio" placeholder="Endereço">

<button id="btnSalvar">Salvar Prédio</button>

<h4>Lista de prédios</h4>

<div id="listaPredios"></div>

</div>



<div class="card">

<h3>Unidades</h3>

<select id="predioSelect"></select>

<input
id="numeroUnidade"
placeholder="Número da unidade"
/>

<input
id="andarUnidade"
placeholder="Andar"
/>

<button onclick="salvarUnidade()">
Salvar Unidade
</button>

<h4>Lista de unidades</h4>
<div id="listaUnidades"></div>
</div>



<div class="card">

<h3>Inquilinos</h3>

<button>Cadastrar Inquilino</button>

</div>


</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


const supabaseUrl = "https://foegiwrgbkkhsqzpgcou.supabase.co"
const supabaseKey = "sb_publishable_CzV3zALwQBTrRwR_6btWbw_jvcBzW5z"
const supabaseClient = window.supabase.createClient(
supabaseUrl,
supabaseKey
)



async function salvarPredio(){

const nome = document.getElementById("nomePredio").value

const endereco = document.getElementById("enderecoPredio").value


if(!nome || !endereco){

alert("Preencha os campos")

return

}


const { error } = await supabaseClient
.from("predios")
.insert([
{
nome: nome,
endereco: endereco
}
])


if(error){

console.log(error)

alert("Erro ao salvar")

return

}


alert("Prédio cadastrado")


document.getElementById("nomePredio").value=""
document.getElementById("enderecoPredio").value=""


listarPredios()

}



async function listarPredios(){

const { data, error } = await supabaseClient
.from("predios")
.select("*")


if(error){

console.log(error)

return

}


let html=""

data.forEach(predio => {

html += `<p>${predio.nome} - ${predio.endereco}</p>`

})


document.getElementById("listaPredios").innerHTML = html

}



document
.getElementById("btnSalvar")
.addEventListener("click", salvarPredio)

async function salvarUnidade(){

const predio_id =
document.getElementById("predioSelect").value

const numero =
document.getElementById("numeroUnidade").value

const andar =
document.getElementById("andarUnidade").value

const { error } = await supabaseClient
.from("unidades")
.insert([
{
predio_id: predio_id,
numero: numero
}
])

if(error){

console.log(error)
alert("Erro ao salvar unidade")

return

}

alert("Unidade cadastrada")

}
async function carregarPredios(){

const { data } = await supabaseClient
.from("predios")
.select("*")

const select =
document.getElementById("predioSelect")

select.innerHTML = ""

data.forEach(predio => {

const option = document.createElement("option")

option.value = predio.id
option.text = predio.nome

select.appendChild(option)

})

}

carregarPredios()
listarPredios()


</script>


</body>

</html>
