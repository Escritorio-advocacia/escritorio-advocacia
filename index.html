<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escritório de Advocacia</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162d6b;
}
</style>
</head>

<body>

<header>
Sistema — Escritório de Advocacia
</header>

<div class="container">

<div class="card">
<h3>Painel Financeiro</h3>
<p>Controle de aluguéis e recebimentos.</p>
</div>

<div class="card">
<h3>Prédios</h3>
<button>Cadastrar Prédio</button>
</div>

<div class="card">
<h3>Unidades</h3>
<button>Cadastrar Unidade</button>
</div>

<div class="card">
<h3>Inquilinos</h3>
<button>Cadastrar Inquilino</button>
</div>

<div class="card">
<h3>Pagamentos</h3>
<button>Registrar Pagamento</button>
</div>

</div>

</body>
</html>
